      <stop offset="0%" style="stop-color:#818cf8" />
      <stop offset="100%" style="stop-color:#a855f7" />
    </linearGradient>
  </defs>

  <!-- Document body -->
  <rect x="8" y="8" width="52" height="64" rx="8" fill="url(#grad)" />

